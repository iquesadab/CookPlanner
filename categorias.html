<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/categorias.css">

    <title>Categorias</title>
</head>
<body>
    <header class="contenedorHeader">
        <h1 class="tituloPrincipal">Administrar Categorías</h1>
    </header>
    
    <section class="contenedorCategorias">

    <div class="contenidoCategorias">

        <!-- LISTA DE CATEGORÍAS -->
        <div class="listaCategorias">

            <div class="filaCategoria">
                <p class="nombreCategoria">▶ Desayuno</p>

                <div class="accionesCategoria">
                    <button class="botonAccion Editar">Editar</button>
                    <button class="botonAccion Eliminar">Eliminar</button>
                </div>
            </div>

            <div class="lineaSeparadora"></div>

            <div class="filaCategoria">
                <p class="nombreCategoria">▶ Almuerzo</p>

                <div class="accionesCategoria">
                    <button class="botonAccion Editar">Editar</button>
                    <button class="botonAccion Eliminar">Eliminar</button>
                </div>
            </div>

            <div class="lineaSeparadora"></div>

            <div class="filaCategoria">
                <p class="nombreCategoria">▶ Cena</p>

                <div class="accionesCategoria">
                    <button class="botonAccion Editar">Editar</button>
                    <button class="botonAccion Eliminar">Eliminar</button>
                </div>
            </div>

            <div class="lineaSeparadora"></div>

            <div class="filaCategoria">
                <p class="nombreCategoria">▶ Postre</p>

                <div class="accionesCategoria">
                    <button class="botonAccion Editar">Editar</button>
                    <button class="botonAccion Eliminar">Eliminar</button>
                </div>
            </div>

        </div>

        <!-- BOTÓN NUEVA CATEGORÍA -->
        <div class="contenedorNuevaCategoria">
            <button id ="NuevaCategoria" class="botonNuevaCategoria">Nueva Categoría</button>
        </div>

    </div>

    <div class="lineaFinal"></div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/categorias.js"></script>
</body>
</html>
