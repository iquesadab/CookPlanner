<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookPlanner | Iniciar sesión</title>

    <link rel="stylesheet" href="css/index.css">

</head>
<body>
    <header class = "contenedorHeaderIndex">
        <img class = "logo" src="assets/CookPlanner Logo.png" alt="Logo de CookPlanner">
        <h1 class = "tituloPrincipal">CookPlanner</h1>
    </header>

    <form class = "contenedor"> 
        <div class = "tarjeta">
            <h2 class="tituloIniciarSesion">Iniciar sesión</h2>

            <!--Correo electrónico-->
            <div class="campo">
                <input type="email" id="txtCorreo" placeholder="Correo electrónico">
            </div>

            <!--Contraseña-->
            <div class="campo">
                <input type="password" id="txtContrasena" placeholder="Contraseña">
            </div>

            <button type="button" id="iniciarSesion">Iniciar sesión</button>

            <a class = "registrarse" href="https://registrelo.go.cr/">¿No tienes cuenta? Registrate</a>
        </div>

    </form>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/index.js"></script>
</body>
</html>
