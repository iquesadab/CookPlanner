<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Enlazar en CSS-->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/buscarReceta.css">

    <title>Buscar Receta</title>

</head>
<body>
    <header class = "contenedorHeader">
        <div class = "contenedorIzquierdo">
            <img class = "logo" src="assets/CookPlanner Logo.png" alt="Logo de CookPlanner">
            <h1 class = "tituloPrincipal">CookPlanner</h1>
        </div>
            
        <div class = "contenedorDerecho">
            <a class = "tituloPrincipal" href="https://support.google.com/mail/answer/56256?hl=es">Perfil</a>
        </div>
    </header>

    <main class = "contenedorPrincipal">

        <section class="contenedorOpciones">
            <h2>Filtros</h2>
            <button type="button">Categorías</button>
            <button type="button">Dificultad</button>
        </section>
    
        <section class="contenedorBusqueda">
            <div class="barraBusqueda">
                <input type="text" placeholder="Buscar receta">
                <button type="button">Buscar</button>
            </div>

            <div class="lineaSeparadora"></div>

            <section class="contenedorTarjetas">

                <div class="tarjetaReceta">
                    <img src="assets/Pasta Alfredo.jpg" alt= "">
                    <h2>Pasta Alfredo original</h2>
                    <button type="button">Ver receta</button>
                </div>

                <div class="tarjetaReceta">
                    <img src="assets/Lasagna Carne.png" alt= "">
                    <h2>Lasaña clásica de carne</h2>
                    <button type="button">Ver receta</button>
                </div>

                <div class="tarjetaReceta">
                    <img src="assets/Ensalada Cesar Fresca.avif" alt= "">
                    <h2>Ensalada César fresca</h2>
                    <button type="button">Ver receta</button>
                </div>

                <div class="tarjetaReceta">
                    <img src="assets/Lomo-de-Res-con-Salsa-de-Vino-5354-1100x825.jpg" alt= "">
                    <h2>Lomito en salsa de vino</h2>
                    <button type="button">Ver receta</button>
                </div>

                <div class="tarjetaReceta">
                    <img src="assets/Hamburguesa de la casa.jpg" alt= "">
                    <h2>Hamburguesa casera gourmet</h2>
                    <button type="button">Ver receta</button>
                </div>

                <div class="tarjetaReceta">
                    <img src="assets/Sopa azteca.jpeg" alt= "">
                    <h2>Sopa de tortilla Azteca</h2>
                    <button type="button">Ver receta</button>
                </div>

                <div class="tarjetaReceta">
                    <img src="assets/cortes-finos-rib-eye.jpg" alt= "">
                    <h2>Corte Rib Eye a la parrilla</h2>
                    <button type="button">Ver receta</button>
                </div>

                <div class="tarjetaReceta">
                    <img src="assets/Arroz con Camarones.jpg" alt= "">
                    <h2>Arroz con Camarones</h2>
                    <button type="button">Ver receta</button>
                </div>

                <div class="tarjetaReceta">
                    <img src="assets/Pizza Margarita.jpg" alt= "">
                    <h2>Pizza Margarita Italiana</h2>
                    <button type="button">Ver receta</button>
                </div>
            </section>
        </section>
    </main>

</body>
</html>
